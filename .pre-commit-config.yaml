repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.1
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.7
          - types-requests
          - mcp>=1.12
          - starlette>=0.37
          - uvicorn>=0.30
          - pyjwt[crypto]>=2.8
          - cryptography>=42
          - jsonschema>=4.0
          - types-jsonschema
        args: ["--strict", "src/vividscripts_mcp"]
        # Type-check the whole package as a unit; don't let pre-commit pass
        # individual file paths (would duplicate the module under `files:` filter).
        pass_filenames: false
        files: ^src/

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.0
    hooks:
      - id: gitleaks
        # Catches accidentally committed secrets before they reach the
        # remote. GitHub's native secret scanning is the backstop; this is
        # the front line.

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        # KAN-98 — static analysis for the broad ``==``-on-secret /
        # ``subprocess shell=True`` / ``yaml.load`` class of bugs. Half
        # of the audit's #14–#23 findings would have been auto-flagged.
        # Configuration lives in ``bandit.yaml`` (excludes ``tests/``).
        args: ["-c", "bandit.yaml", "-r", "src/"]
        # pre-commit ships paths via ``files`` but bandit's recursive
        # scan reads ``src/`` directly; stop pre-commit from also
        # passing per-file paths (would re-scan the same files twice).
        pass_filenames: false
        files: ^src/
