name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege workflow permissions: tests only need to read the repo.
# Anything that needs more (e.g. PyPI publish) gets its own workflow with
# its own scoped permissions.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy --strict src/vividscripts_mcp

      - name: Test (pytest)
        run: pytest --cov=vividscripts_mcp --cov-report=term-missing
